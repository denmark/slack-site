{{define "group_list_content"}}
<h1 class="text-2xl font-bold text-slate-800 mb-4">Private channels</h1>
<div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
  <table class="min-w-full divide-y divide-slate-200">
    <thead class="bg-slate-50">
      <tr>
        <th class="px-4 py-3 text-left text-sm font-medium text-slate-700">Name</th>
        <th class="px-4 py-3 text-left text-sm font-medium text-slate-700">Members</th>
        <th class="px-4 py-3 text-left text-sm font-medium text-slate-700">Topic</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-200">
      {{range .Groups}}
      <tr class="hover:bg-slate-50">
        <td class="px-4 py-3">
          <a href="/groups/{{.ID}}" class="text-sky-600 font-medium hover:underline"># {{.Name}}</a>
        </td>
        <td class="px-4 py-3 text-slate-600">{{.MemberCount}}</td>
        <td class="px-4 py-3 text-slate-600 text-sm truncate max-w-md">{{.TopicValue}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
