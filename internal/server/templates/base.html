{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} · Slack export</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <nav class="bg-slate-800 text-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/" class="font-semibold text-lg hover:text-slate-200">Slack export</a>
      <a href="/channels" class="hover:text-slate-200">Channels</a>
      <a href="/groups" class="hover:text-slate-200">Private channels</a>
      <a href="/dms" class="hover:text-slate-200">DMs</a>
      <a href="/mpims" class="hover:text-slate-200">MPIMs</a>
      <a href="/search" class="hover:text-slate-200">Search</a>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-6">
    {{.Content}}
  </main>
</body>
</html>
{{end}}
