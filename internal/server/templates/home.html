{{define "home_content"}}
<div class="space-y-6">
  <h1 class="text-2xl font-bold text-slate-800">Browse your Slack export</h1>
  <div class="grid gap-4 sm:grid-cols-2">
    <a href="/channels" class="block p-6 rounded-lg bg-white border border-slate-200 shadow-sm hover:border-slate-300 hover:shadow transition">
      <h2 class="text-lg font-semibold text-slate-800">Channels</h2>
      <p class="text-slate-600 mt-1">Public channels</p>
    </a>
    <a href="/groups" class="block p-6 rounded-lg bg-white border border-slate-200 shadow-sm hover:border-slate-300 hover:shadow transition">
      <h2 class="text-lg font-semibold text-slate-800">Private channels</h2>
      <p class="text-slate-600 mt-1">Private groups</p>
    </a>
    <a href="/dms" class="block p-6 rounded-lg bg-white border border-slate-200 shadow-sm hover:border-slate-300 hover:shadow transition">
      <h2 class="text-lg font-semibold text-slate-800">DMs</h2>
      <p class="text-slate-600 mt-1">Direct messages</p>
    </a>
    <a href="/mpims" class="block p-6 rounded-lg bg-white border border-slate-200 shadow-sm hover:border-slate-300 hover:shadow transition">
      <h2 class="text-lg font-semibold text-slate-800">MPIMs</h2>
      <p class="text-slate-600 mt-1">Multi-person DMs</p>
    </a>
  </div>
  <p class="text-slate-600">
    <a href="/search" class="text-sky-600 hover:underline">Search</a> across all messages.
  </p>
</div>
{{end}}
